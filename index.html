<!doctype html>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* Responsive custom adjustments for the big hero image aspect */
        .featured-hero-img {
            height: 260px; /* Mobile height fallback */
        }

        @media (min-width: 768px) {
            .featured-hero-img {
                height: 380px; /* Larger desktop presence */
            }
        }
    </style>
</head>

<body>

    <header class="fixed-header shadow">

            <!-- Top-Right Login Link (Commented Out) -->
            <!--

            -->

                    <a class="navbar-brand active" aria-current="page" href="index.html">DLif3</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link" href="blog.html">Blog</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="audio.html">Audio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="video.html">Video</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="images.html">Images</a>
                            </li>
                            <li class="nav-item">

                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">About</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="contact.html">Contact</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link disabled" href="login.html">Login</a>
                            </li>
                        </ul>

                        <form class="d-flex" role="search">
                            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">

                        </form>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <!-- The content-wrapper pushes content down below the fixed navbar layer -->
    <main class="content-wrapper">
        
        <!-- Hero Intro Section -->
        <div id="div-1" class="container fluid py-4">
            <h2 class="text-center fw-bold display-5">Welcome to DLif3!</h2>
            <p class="text-center text-secondary fs-5">A repository for my thoughts and art</p>
        </div>

        <!-- Main Featured Highlight Card (Expanded for Desktop) -->
        <div id="card-container2" class="container my-5" style="max-width: 1100px;">
            <div class="card overflow-hidden shadow">
                <div class="row g-0 align-items-stretch">

                    <!-- Left Side: Prominent Image Window -->
                    <div class="col-12 col-md-5">
                        <img src="audio-visual/sunset1.jpg" class="img-fluid w-100 object-fit-cover featured-hero-img"
                            alt="Sunset at Old Baldy">
                    </div>

                    <!-- Right Side: Clean Typography Context with Extra Padding -->
                    <div class="col-12 col-md-7 d-flex align-items-center">
                        <div class="card-body p-4 p-lg-5">
                            <h6 class="text-muted small text-uppercase fw-bold mb-2 tracking-wider">July 25, 2025</h6>
                            <h3 class="h2 mb-3 fw-bold">Old Baldy Sunset</h3>
                            <p class="card-text text-secondary fs-5 mb-2">Enjoyed a stunning golden hour view while
                                hiking trails at Old Baldy Park.</p>
                            <p class="card-text text-muted mb-4"><i class="bi bi-geo-alt"></i> Wimberley, Texas</p>
                            <a href="images.html" class="btn btn-outline-dark px-4 py-2 fw-semibold">See more</a>
                        </div>
                    </div>

                </div>
            </div>
        </div><!-- end card container2 -->

    <!-- Scripts (Placed at the bottom for performance) -->
    <script src="script.js"></script>
    <!-- Combined Bootstrap JS Bundle (Includes Popper) -->
